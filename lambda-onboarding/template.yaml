apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: lambda-onboarding
  title: Onboard Lambda Function
  description: >
    Onboards a new AWS Lambda function. Creates a GitHub repo,
    registers it in the catalog, and triggers a Harness pipeline.
  tags:
    - lambda
    - aws
    - serverless
spec:
  owner: platform-team
  type: service

  parameters:

    # ── Page 1: Service metadata ───────────────────────────────
    - title: Function details
      required:
        - functionName
        - description
        - owner
        - environment
      properties:
        functionName:
          title: Function name
          type: string
          description: Lowercase letters and hyphens only
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this function do?

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev

    # ── Page 2: Lambda configuration ──────────────────────────
    - title: Lambda configuration
      required:
        - runtime
        - handler
        - s3Bucket
        - s3Key
      properties:
        runtime:
          title: Runtime
          type: string
          enum:
            - nodejs18.x
            - nodejs20.x
            - python3.11
            - python3.12
            - java17
            - java21
          default: nodejs18.x

        handler:
          title: Handler
          type: string
          default: index.handler
          description: e.g. index.handler or main.lambda_handler

        s3Bucket:
          title: S3 bucket
          type: string
          description: S3 bucket containing the deployment zip

        s3Key:
          title: S3 key
          type: string
          description: Path to zip file in S3 e.g. functions/my-function.zip

        lambdaMemory:
          title: Memory (MB)
          type: number
          enum:
            - 128
            - 256
            - 512
            - 1024
            - 2048
          default: 128

        timeout:
          title: Timeout (seconds)
          type: number
          default: 30
          description: Max 900 seconds (15 minutes)

    # ── Page 3: Secrets and env vars ──────────────────────────
    - title: Secrets and environment variables
      properties:
        ssmPaths:
          title: SSM Parameter paths
          type: string
          description: One SSM path per line
          ui:widget: textarea
          ui:options:
            rows: 6

    # ── Page 4: GitHub repository ──────────────────────────────
    - title: GitHub repository
      required:
        - repoName
        - repoOrg
      properties:
        repoName:
          title: Repository name
          type: string

        repoOrg:
          title: GitHub organisation
          type: string
          default: Ketan-Joshi

  steps:

    - id: fetch-template
      name: Fetch skeleton files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          functionName: ${{ parameters.functionName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          environment: ${{ parameters.environment }}
          runtime: ${{ parameters.runtime }}
          repoOrg: ${{ parameters.repoOrg }}
          repoName: ${{ parameters.repoName }}

    - id: publish-github
      name: Create GitHub repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}
        defaultBranch: main

    - id: trigger-harness
      name: Trigger Harness pipeline
      action: harness:pipeline:trigger
      input:
        pipelineType: lambda
        serviceName: ${{ parameters.functionName }}
        environment: ${{ parameters.environment }}
        runtime: ${{ parameters.runtime }}
        handler: ${{ parameters.handler }}
        s3Bucket: ${{ parameters.s3Bucket }}
        s3Key: ${{ parameters.s3Key }}
        lambdaMemory: ${{ parameters.lambdaMemory }}
        timeout: ${{ parameters.timeout }}
        ssmPaths: ${{ parameters.ssmPaths }}

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
      - title: Harness pipeline
        url: ${{ steps['trigger-harness'].output.pipelineUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
