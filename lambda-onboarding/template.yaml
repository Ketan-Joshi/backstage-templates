apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: lambda-onboarding
  title: Onboard Lambda Function
  description: >
    Onboards a new AWS Lambda function. Triggers a Harness CI/CD
    pipeline that packages and deploys the function.
  tags:
    - lambda
    - aws
    - serverless
spec:
  owner: platform-team
  type: service

  parameters:

    # ── Page 1: Function metadata ──────────────────────────────
    - title: Function details
      required:
        - functionName
        - description
        - owner
        - environment
      properties:
        functionName:
          title: Function name
          type: string
          description: Lowercase letters and hyphens only. e.g. process-orders
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this function do?

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev

    # ── Page 2: Source code ────────────────────────────────────
    - title: Source code
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub repository URL
          type: string
          description: >
            URL of the existing GitHub repo containing your Lambda code.
            e.g. https://github.com/myorg/my-lambda
          ui:autofocus: true

        branch:
          title: Branch
          type: string
          default: main
          description: Branch to build and deploy

    # ── Page 3: Lambda configuration ──────────────────────────
    - title: Lambda configuration
      required:
        - runtime
        - handler
      properties:
        runtime:
          title: Runtime
          type: string
          enum:
            - nodejs18.x
            - nodejs20.x
            - python3.11
            - python3.12
            - java17
            - java21
          default: nodejs18.x

        handler:
          title: Handler
          type: string
          default: index.handler
          description: >
            Function handler e.g.
            index.handler (Node.js)
            main.lambda_handler (Python)
            com.example.Handler::handleRequest (Java)

        lambdaMemory:
          title: Memory (MB)
          type: number
          enum:
            - 128
            - 256
            - 512
            - 1024
            - 2048
          default: 128

        timeout:
          title: Timeout (seconds)
          type: number
          default: 30
          description: Maximum execution time. Max 900 seconds (15 min)

        architecture:
          title: Architecture
          type: string
          enum:
            - x86_64
            - arm64
          default: x86_64
          description: arm64 is cheaper and faster for most workloads

    # ── Page 4: Secrets and env vars ──────────────────────────
    - title: Secrets and environment variables
      properties:
        ssmPaths:
          title: SSM Parameter Store paths
          type: string
          description: >
            One SSM parameter path per line. Injected as environment
            variables into your Lambda function.
            Example:
            /myapp/dev/DB_HOST
            /myapp/dev/API_KEY
          ui:widget: textarea
          ui:options:
            rows: 8

        secretsManagerArns:
          title: Secrets Manager ARNs (optional)
          type: string
          description: >
            One Secrets Manager secret ARN per line.
          ui:widget: textarea
          ui:options:
            rows: 4

  # ── Steps ──────────────────────────────────────────────────
  steps:

    - id: trigger-harness
      name: Trigger Harness CI/CD pipeline
      action: harness:pipeline:trigger
      input:
        pipelineType: lambda
        serviceName: ${{ parameters.functionName }}
        environment: ${{ parameters.environment }}
        repoUrl: ${{ parameters.repoUrl }}
        branch: ${{ parameters.branch }}
        runtime: ${{ parameters.runtime }}
        handler: ${{ parameters.handler }}
        lambdaMemory: ${{ parameters.lambdaMemory }}
        timeout: ${{ parameters.timeout }}
        architecture: ${{ parameters.architecture }}
        ssmPaths: ${{ parameters.ssmPaths }}
        secretsManagerArns: ${{ parameters.secretsManagerArns }}

  output:
    links:
      - title: Harness pipeline
        url: ${{ steps['trigger-harness'].output.pipelineUrl }}
        icon: dashboard
