apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ecs-service-onboarding
  title: Onboard ECS Application
  description: >
    Creates a GitHub repo, ECR repository, ECS service,
    GoCD pipeline, and registers the service in the Backstage catalog — all in one click.
  tags:
    - ecs
    - aws
    - recommended
    - fargate
  annotations:
    backstage.io/techdocs-ref: dir:.

spec:
  owner: platform-team
  type: service

  parameters:

    # ─── Page 1: Service details ───────────────────────────
    - title: Service details
      required:
        - serviceName
        - description
        - owner
        - system
      properties:
        serviceName:
          title: Service name
          type: string
          description: Lowercase letters, numbers, and hyphens only
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this service do?
          ui:widget: textarea
          ui:options:
            rows: 3

        owner:
          title: Team owner
          type: string
          description: Team responsible for this service
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        system:
          title: System
          type: string
          description: Which system does this service belong to?
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System

        lifecycle:
          title: Lifecycle
          type: string
          description: Current lifecycle stage of the service
          enum:
            - experimental
            - production
            - deprecated
          default: experimental

        tags:
          title: Tags
          type: array
          items:
            type: string
          description: Tags to categorise this service (e.g. java, nodejs, kafka)
          ui:widget: array

    # ─── Page 2: ECS configuration ─────────────────────────
    - title: ECS configuration
      required:
        - environment
        - cpu
        - memory
        - desiredCount
        - containerPort
      properties:
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev

        cluster:
          title: ECS cluster name
          type: string
          description: Name of the existing ECS cluster
          default: backstage-poc-cluster

        cpu:
          title: CPU units
          type: string
          enum:
            - '256'
            - '512'
            - '1024'
            - '2048'
            - '4096'
          default: '256'
          description: 256 = 0.25 vCPU, 512 = 0.5 vCPU

        memory:
          title: Memory (MB)
          type: string
          enum:
            - '512'
            - '1024'
            - '2048'
            - '4096'
            - '8192'
          default: '512'

        desiredCount:
          title: Number of tasks
          type: number
          default: 1
          minimum: 1
          maximum: 50
          description: How many ECS tasks to run

        containerPort:
          title: Container port
          type: number
          default: 8080
          description: Port your app listens on inside the container

        launchType:
          title: Launch type
          type: string
          enum:
            - FARGATE
          default: FARGATE

        healthCheckPath:
          title: Health check path
          type: string
          default: /health
          description: HTTP path for ALB health checks

    # ─── Page 3: Observability ─────────────────────────────
    - title: Observability & Alerting
      properties:
        enablePagerDuty:
          title: Enable PagerDuty alerting
          type: boolean
          default: true
          description: Create a PagerDuty service for this component

        enableDatadog:
          title: Enable Datadog APM
          type: boolean
          default: true
          description: Inject Datadog APM agent into the container

        enableSentry:
          title: Enable Sentry error tracking
          type: boolean
          default: true

        slackChannel:
          title: Slack alert channel
          type: string
          description: Slack channel for deployment and alert notifications (e.g. #my-service-alerts)
          default: '#platform-alerts'

    # ─── Page 4: Repository ────────────────────────────────
    - title: GitHub repository
      required:
        - repoName
        - repoOrg
      properties:
        repoName:
          title: Repository name
          type: string
          description: Name of the new GitHub repo to create

        repoOrg:
          title: GitHub organisation
          type: string
          description: Your GitHub org name
          default: Ketan-Joshi

        repoVisibility:
          title: Repository visibility
          type: string
          enum:
            - private
            - internal
            - public
          default: private

        defaultBranch:
          title: Default branch name
          type: string
          default: main

  # ─── Steps ───────────────────────────────────────────────
  steps:

    - id: fetch-template
      name: Fetch skeleton files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          lifecycle: ${{ parameters.lifecycle }}
          tags: ${{ parameters.tags }}
          environment: ${{ parameters.environment }}
          containerPort: ${{ parameters.containerPort }}
          healthCheckPath: ${{ parameters.healthCheckPath }}
          repoOrg: ${{ parameters.repoOrg }}
          repoName: ${{ parameters.repoName }}
          enableDatadog: ${{ parameters.enableDatadog }}
          enableSentry: ${{ parameters.enableSentry }}
          slackChannel: ${{ parameters.slackChannel }}

    - id: publish-github
      name: Create GitHub repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}
        defaultBranch: ${{ parameters.defaultBranch }}
        repoVisibility: ${{ parameters.repoVisibility }}
        topics:
          - ecs
          - fargate
          - ${{ parameters.environment }}

    - id: create-ecr
      name: Create ECR repository
      action: aws:ecr:create
      input:
        repoName: ${{ parameters.serviceName }}
        region: us-east-1
        tags:
          service: ${{ parameters.serviceName }}
          environment: ${{ parameters.environment }}
          owner: ${{ parameters.owner }}

    - id: create-ecs
      name: Create ECS service
      action: aws:ecs:create-service
      input:
        serviceName: ${{ parameters.serviceName }}
        cluster: backstage-poc-cluster
        environment: ${{ parameters.environment }}
        cpu: ${{ parameters.cpu }}
        memory: ${{ parameters.memory }}
        desiredCount: ${{ parameters.desiredCount }}
        containerPort: ${{ parameters.containerPort }}
        launchType: ${{ parameters.launchType }}
        healthCheckPath: ${{ parameters.healthCheckPath }}
        ecrRepoUri: ${{ steps['create-ecr'].output.repositoryUri }}
        # AWS config pulled from app-config.yaml ecs.environments
        region: us-east-1
        accountId: '058029412961'
        subnets: subnet-0377a9b6b8da787d5,subnet-068b2ef2bf59bad62
        vpcId: vpc-0803d89825ac7428d
        roleArn: arn:aws:iam::058029412961:role/backstage-iam-role
        ecsExecutionRoleArn: arn:aws:iam::058029412961:role/ecsTaskExecutionRole

    - id: create-gocd-pipeline
      name: Create GoCD pipeline
      action: gocd:create-pipeline
      input:
        pipelineName: ${{ parameters.serviceName }}-${{ parameters.environment }}
        repoUrl: ${{ steps['publish-github'].output.remoteUrl }}
        ecrRepoUri: ${{ steps['create-ecr'].output.repositoryUri }}
        environment: ${{ parameters.environment }}

    - id: create-pagerduty-service
      name: Create PagerDuty service
      if: ${{ parameters.enablePagerDuty }}
      action: pagerduty:service:create
      input:
        name: ${{ parameters.serviceName }}
        description: ${{ parameters.description }}
        escalationPolicyId: PDEFAULT

    - id: register-catalog
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
      - title: ECR repository
        url: https://console.aws.amazon.com/ecr/repositories/${{ parameters.serviceName }}
        icon: cloud
      - title: ECS service
        url: https://console.aws.amazon.com/ecs/home#/clusters/${{ parameters.cluster }}/services/${{ parameters.serviceName }}
        icon: cloud
    text:
      - title: Next steps
        content: |
          Your new service **${{ parameters.serviceName }}** has been created!

          **Next steps:**
          1. Clone the repo: `git clone ${{ steps['publish-github'].output.remoteUrl }}`
          2. Push your first Docker image to ECR: `${{ steps['create-ecr'].output.repositoryUri }}`
          3. Check the GoCD pipeline for your first deployment
          4. Set up Datadog APM using the `DD_SERVICE=${{ parameters.serviceName }}` env var
