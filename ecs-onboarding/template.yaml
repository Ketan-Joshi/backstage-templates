apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ecs-service-onboarding
  title: Onboard ECS Fargate Application
  description: >
    Onboards a new ECS Fargate application. Triggers a Harness CI/CD
    pipeline that builds the Docker image and deploys to ECS Fargate.
  tags:
    - ecs
    - fargate
    - aws
    - recommended
spec:
  owner: platform-team
  type: service

  parameters:

    # ── Page 1: Service metadata ───────────────────────────────
    - title: Service details
      required:
        - serviceName
        - description
        - owner
        - environment
      properties:
        serviceName:
          title: Service name
          type: string
          description: Lowercase letters and hyphens only. e.g. payment-service
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this service do?

        owner:
          title: Team owner
          type: string
          description: Team responsible for this service
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev

    # ── Page 2: Source code ────────────────────────────────────
    - title: Source code
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub repository URL
          type: string
          description: >
            URL of the existing GitHub repo containing your application code.
            e.g. https://github.com/myorg/my-service
          ui:autofocus: true

        branch:
          title: Branch
          type: string
          default: main
          description: Branch to build and deploy

        dockerfilePath:
          title: Dockerfile path
          type: string
          default: Dockerfile
          description: >
            Path to Dockerfile relative to repo root.
            e.g. Dockerfile or docker/Dockerfile

    # ── Page 3: ECS configuration ──────────────────────────────
    - title: ECS configuration
      required:
        - cpu
        - memory
        - port
      properties:
        cpu:
          title: CPU units
          type: string
          enum:
            - '256'
            - '512'
            - '1024'
            - '2048'
          default: '256'
          description: 256 = 0.25 vCPU, 512 = 0.5 vCPU

        memory:
          title: Memory (MB)
          type: string
          enum:
            - '512'
            - '1024'
            - '2048'
            - '4096'
          default: '512'

        port:
          title: Container port
          type: number
          default: 8080
          description: Port your app listens on inside the container

        healthCheckPath:
          title: Health check path
          type: string
          default: /health
          description: HTTP path for ALB/ECS health checks e.g. /health or /

        desiredCount:
          title: Number of tasks
          type: number
          default: 1
          description: How many ECS tasks to run

        cluster:
          title: ECS cluster name (optional)
          type: string
          description: >
            Leave blank to use the default cluster for the selected
            environment. Only fill this to override.

    # ── Page 4: Secrets and env vars ──────────────────────────
    - title: Secrets and environment variables
      properties:
        ssmPaths:
          title: SSM Parameter Store paths
          type: string
          description: >
            One SSM parameter path per line. These will be injected
            as environment variables into your ECS container.
            Example:
            /myapp/dev/DB_HOST
            /myapp/dev/DB_PASSWORD
            /myapp/dev/API_KEY
          ui:widget: textarea
          ui:options:
            rows: 8

        secretsManagerArns:
          title: Secrets Manager ARNs (optional)
          type: string
          description: >
            One Secrets Manager secret ARN per line.
            Example:
            arn:aws:secretsmanager:us-east-1:123456789:secret:myapp/db
          ui:widget: textarea
          ui:options:
            rows: 4

  # ── Steps ──────────────────────────────────────────────────
  steps:

    - id: trigger-harness
      name: Trigger Harness CI/CD pipeline
      action: harness:pipeline:trigger
      input:
        pipelineType: ecs
        serviceName: ${{ parameters.serviceName }}
        environment: ${{ parameters.environment }}
        repoUrl: ${{ parameters.repoUrl }}
        branch: ${{ parameters.branch }}
        dockerfilePath: ${{ parameters.dockerfilePath }}
        cpu: ${{ parameters.cpu }}
        memory: ${{ parameters.memory }}
        port: ${{ parameters.port }}
        healthCheckPath: ${{ parameters.healthCheckPath }}
        desiredCount: ${{ parameters.desiredCount }}
        cluster: ${{ parameters.cluster }}
        ssmPaths: ${{ parameters.ssmPaths }}
        secretsManagerArns: ${{ parameters.secretsManagerArns }}

  output:
    links:
      - title: Harness pipeline
        url: ${{ steps['trigger-harness'].output.pipelineUrl }}
        icon: dashboard
