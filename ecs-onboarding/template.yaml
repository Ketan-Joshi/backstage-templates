apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ecs-service-onboarding
  title: Onboard ECS Fargate Application
  description: >
    Onboards a new ECS Fargate application. Triggers a Harness CI/CD
    pipeline and registers the service in the Backstage catalog.
  tags:
    - ecs
    - fargate
    - aws
    - recommended
spec:
  owner: platform-team
  type: service

  parameters:

    - title: Service details
      required:
        - serviceName
        - description
        - owner
        - environment
      properties:
        serviceName:
          title: Service name
          type: string
          description: Lowercase letters and hyphens only. e.g. payment-service
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this service do?

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev

    - title: Source code
      required:
        - repoOrg
        - repoName
      properties:
        repoOrg:
          title: GitHub organisation or username
          type: string
          default: Ketan-Joshi

        repoName:
          title: GitHub repository name
          type: string
          description: Just the repo name e.g. my-service

        branch:
          title: Branch
          type: string
          default: main

        dockerfilePath:
          title: Dockerfile path
          type: string
          default: Dockerfile

    - title: ECS configuration
      required:
        - cpu
        - memory
        - port
      properties:
        cpu:
          title: CPU units
          type: string
          enum:
            - '256'
            - '512'
            - '1024'
            - '2048'
          default: '256'

        memory:
          title: Memory (MB)
          type: string
          enum:
            - '512'
            - '1024'
            - '2048'
            - '4096'
          default: '512'

        port:
          title: Container port
          type: number
          default: 8080

        healthCheckPath:
          title: Health check path
          type: string
          default: /health

        desiredCount:
          title: Number of tasks
          type: number
          default: 1

        cluster:
          title: ECS cluster name (optional)
          type: string
          description: Leave blank to use default from config


    - title: Secrets and environment variables
      properties:

        ssmParameters:
          title: SSM Parameter Store
          description: >
            Add environment variables to be stored in AWS SSM Parameter Store.
            Click "Add Item" to add more parameters.
          type: array
          ui:options:
            addable: true
            removable: true
            orderable: false
          items:
            type: object
            required:
              - path
              - value
            properties:
              path:
                title: Parameter path
                type: string
                description: 'e.g. /myapp/dev/DB_PASSWORD'
              value:
                title: Value
                type: string
                ui:widget: password
              type:
                title: Type
                type: string
                enum:
                  - SecureString
                  - String
                enumNames:
                  - 'SecureString (encrypted)'
                  - 'String (plain text)'
                default: SecureString

        secretsManagerSecrets:
          title: Secrets Manager
          description: >
            Add secrets stored in AWS Secrets Manager.
            Provide the full ARN and value.
          type: array
          ui:options:
            addable: true
            removable: true
            orderable: false
          items:
            type: object
            required:
              - arn
              - value
            properties:
              arn:
                title: Secret ARN
                type: string
                description: 'arn:aws:secretsmanager:us-east-1:058029412961:secret:myapp/dev/db'
              value:
                title: Value
                type: string
                ui:widget: password

  steps:

    - id: trigger-harness
      name: Trigger Harness CI/CD pipeline
      action: harness:pipeline:trigger
      input:
        pipelineType: ecs
        serviceName: ${{ parameters.serviceName }}
        environment: ${{ parameters.environment }}
        repoUrl: https://github.com/${{ parameters.repoOrg }}/${{ parameters.repoName }}
        branch: ${{ parameters.branch }}
        dockerfilePath: ${{ parameters.dockerfilePath }}
        cpu: ${{ parameters.cpu }}
        memory: ${{ parameters.memory }}
        port: ${{ parameters.port }}
        healthCheckPath: ${{ parameters.healthCheckPath }}
        desiredCount: ${{ parameters.desiredCount }}
        cluster: ${{ parameters.cluster }}
        ssmPaths: ${{ parameters.ssmPaths }}
        secretsManagerArns: ${{ parameters.secretsManagerArns }}
  
    - id: manage-secrets
      name: Create or update secrets
      action: aws:secrets:manage
      input:
        environment: ${{ parameters.environment }}
        ssmParameters: ${{ parameters.ssmParameters }}
        secretsManagerSecrets: ${{ parameters.secretsManagerSecrets }}

    - id: create-catalog-file
      name: Register service in catalog
      action: github:catalog:create
      input:
        serviceName: ${{ parameters.serviceName }}
        description: ${{ parameters.description }}
        owner: ${{ parameters.owner }}
        environment: ${{ parameters.environment }}
        ciPipelineUrl: ${{ steps['trigger-harness'].output.ciPipelineUrl }}
        ciPipelineId: ${{ steps['trigger-harness'].output.ciPipelineId }}
        cdPipelineUrl: ${{ steps['trigger-harness'].output.cdPipelineUrl }}
        cdPipelineId: ${{ steps['trigger-harness'].output.cdPipelineId }}
        repoUrl: https://github.com/${{ parameters.repoOrg }}/${{ parameters.repoName }}
        cpu: ${{ parameters.cpu }}
        memory: ${{ parameters.memory }}
        port: ${{ parameters.port }}
        serviceType: service
        tags:
          - ecs
          - fargate

  output:
    links:
      - title: CI Pipeline (Build)
        url: ${{ steps['trigger-harness'].output.ciPipelineUrl }}
        icon: dashboard
      - title: CD Pipeline (Deploy)
        url: ${{ steps['trigger-harness'].output.cdPipelineUrl }}
        icon: dashboard
      - title: catalog-info.yaml
        url: ${{ steps['create-catalog-file'].output.catalogInfoUrl }}
        icon: github
