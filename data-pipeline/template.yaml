apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: data-pipeline
  title: Create a Data Pipeline
  description: >
    Scaffolds a Python-based data pipeline (Kafka Streams or batch ETL)
    with Airflow DAG, Docker packaging, and Backstage catalog registration.
  tags:
    - data
    - python
    - kafka
    - etl
    - airflow
  annotations:
    backstage.io/techdocs-ref: dir:.

spec:
  owner: data-team
  type: service

  parameters:

    - title: Pipeline details
      required:
        - pipelineName
        - description
        - owner
        - pipelineType
      properties:
        pipelineName:
          title: Pipeline name
          type: string
          description: Lowercase letters, numbers, and hyphens
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What data does this pipeline process?
          ui:widget: textarea

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        system:
          title: System
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System

        pipelineType:
          title: Pipeline type
          type: string
          enum:
            - kafka-streams
            - batch-etl
            - spark
          default: kafka-streams
          description: >
            kafka-streams: real-time event processing;
            batch-etl: scheduled batch jobs;
            spark: large-scale distributed processing

        pythonVersion:
          title: Python version
          type: string
          enum:
            - '3.10'
            - '3.11'
            - '3.12'
          default: '3.11'

    - title: Source & Destination
      properties:
        sourceType:
          title: Data source
          type: string
          enum:
            - kafka
            - s3
            - rds-postgresql
            - api
          default: kafka

        destinationType:
          title: Data destination
          type: string
          enum:
            - redshift
            - s3
            - kafka
            - rds-postgresql
          default: redshift

        schedule:
          title: Schedule (for batch pipelines)
          type: string
          description: Cron expression (e.g. "0 2 * * *" for 2am daily)
          default: '0 2 * * *'

    - title: GitHub repository
      required:
        - repoName
        - repoOrg
      properties:
        repoName:
          title: Repository name
          type: string

        repoOrg:
          title: GitHub organisation
          type: string
          default: Ketan-Joshi

  steps:

    - id: fetch-template
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          pipelineName: ${{ parameters.pipelineName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          pipelineType: ${{ parameters.pipelineType }}
          pythonVersion: ${{ parameters.pythonVersion }}
          sourceType: ${{ parameters.sourceType }}
          destinationType: ${{ parameters.destinationType }}
          schedule: ${{ parameters.schedule }}
          repoOrg: ${{ parameters.repoOrg }}
          repoName: ${{ parameters.repoName }}

    - id: publish-github
      name: Create GitHub repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}
        defaultBranch: main
        topics:
          - python
          - data-pipeline
          - ${{ parameters.pipelineType }}

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
