site_name: "${{ values.pipelineName }}"
site_description: "${{ values.description }}"
repo_url: https://github.com/${{ values.repoOrg }}/${{ values.repoName }}

docs_dir: docs

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Runbooks:
      - Deployment: runbooks/deployment.md

plugins:
  - techdocs-core

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
