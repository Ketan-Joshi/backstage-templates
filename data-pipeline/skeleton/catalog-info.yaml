apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.pipelineName }}
  title: ${{ values.pipelineName | title }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.repoOrg }}/${{ values.repoName }}
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: ${{ values.pipelineName }}
    backstage.io/kubernetes-namespace: data
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/${{ values.pipelineName }}
  tags:
    - python
    - data
    - ${{ values.pipelineType }}
    - ${{ values.sourceType }}
    - ${{ values.destinationType }}
  links:
    - url: https://airflow.example.com/dags/${{ values.pipelineName }}
      title: Airflow DAG
      icon: dashboard
    - url: https://github.com/${{ values.repoOrg }}/${{ values.repoName }}
      title: GitHub
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
  system: ${{ values.system }}
