apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-library
  title: Create a Node.js Library
  description: >
    Scaffolds a TypeScript npm library with testing, linting, semantic-release,
    and automatic Backstage catalog registration.
  tags:
    - nodejs
    - typescript
    - library
    - npm
  annotations:
    backstage.io/techdocs-ref: dir:.

spec:
  owner: platform-team
  type: library

  parameters:

    - title: Library details
      required:
        - libraryName
        - description
        - owner
        - npmScope
      properties:
        libraryName:
          title: Library name
          type: string
          description: Lowercase letters, numbers, and hyphens (e.g. my-utils)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        npmScope:
          title: npm scope
          type: string
          description: npm organisation scope (e.g. @example)
          default: '@example'

        description:
          title: Description
          type: string
          description: What does this library do?
          ui:widget: textarea

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        system:
          title: System
          type: string
          description: Which system does this library belong to?
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System

        nodeVersion:
          title: Node.js version
          type: string
          enum:
            - '18'
            - '20'
            - '22'
          default: '20'

    - title: GitHub repository
      required:
        - repoName
        - repoOrg
      properties:
        repoName:
          title: Repository name
          type: string

        repoOrg:
          title: GitHub organisation
          type: string
          default: Ketan-Joshi

        repoVisibility:
          title: Visibility
          type: string
          enum:
            - private
            - internal
            - public
          default: private

  steps:

    - id: fetch-template
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          libraryName: ${{ parameters.libraryName }}
          npmScope: ${{ parameters.npmScope }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          nodeVersion: ${{ parameters.nodeVersion }}
          repoOrg: ${{ parameters.repoOrg }}
          repoName: ${{ parameters.repoName }}

    - id: publish-github
      name: Create GitHub repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        topics:
          - nodejs
          - typescript
          - library

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
