site_name: "${{ values.libraryName }}"
site_description: "${{ values.description }}"
repo_url: https://github.com/${{ values.repoOrg }}/${{ values.repoName }}

docs_dir: docs

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - techdocs-core

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
