##############################################################
# app-config.yaml — Backstage POC
# Server: http://3.208.117.182
# GitHub: Ketan-Joshi/backstage-templates
##############################################################

app:
  title: Scaffolded Backstage App
  baseUrl: http://3.208.117.182:3000
  listen:
    port: 3000
    host: 0.0.0.0
  # Configure the catalog index page to be the root page
  packages: all
  extensions:
    - page:
        catalog:
          config:
            path: /

organization:
  name: My Company

# ── Backend ──────────────────────────────────────────────────
backend:
  baseUrl: http://3.208.117.182:7007
  listen:
    port: 7007
    host: 0.0.0.0
  auth:
    keys:
      - secret: hi-there
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://3.208.117.182:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

# ── Integrations ─────────────────────────────────────────────
integrations:
  github:
    - host: github.com
      # Personal Access Token — set via environment variable
      # export GITHUB_TOKEN=ghp_xxxx
      token: ${GITHUB_TOKEN}

# ── Proxy ────────────────────────────────────────────────────
proxy:
  ### Add proxy endpoints here if needed
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# ── TechDocs ─────────────────────────────────────────────────
techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

# ── Auth ─────────────────────────────────────────────────────
# Using guest auth for POC — no OAuth setup required
auth:
  providers:
    guest: {}

# ── Scaffolder ───────────────────────────────────────────────
scaffolder:
  # Uses the GitHub integration token above for publish:github action

# ── Catalog ──────────────────────────────────────────────────
catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Template
        - Domain
        - Group
        - User

  locations:
    # ── Default local examples (keep for reference) ──────────
    - type: file
      target: ../../examples/entities.yaml

    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]

    # ── POC Catalog root ─────────────────────────────────────
    # Single entry point — loads all entities from this repo
    - type: url
      target: https://github.com/Ketan-Joshi/backstage-templates/blob/main/catalog/all.yaml
      rules:
        - allow:
            - Component
            - API
            - Resource
            - System
            - Domain
            - Group
            - User
            - Location

    # ── Software Templates ───────────────────────────────────
    - type: url
      target: https://github.com/Ketan-Joshi/backstage-templates/blob/main/ecs-onboarding/template.yaml
      rules:
        - allow: [Template]

    - type: url
      target: https://github.com/Ketan-Joshi/backstage-templates/blob/main/nodejs-library/template.yaml
      rules:
        - allow: [Template]

    - type: url
      target: https://github.com/Ketan-Joshi/backstage-templates/blob/main/documentation-site/template.yaml
      rules:
        - allow: [Template]

    - type: url
      target: https://github.com/Ketan-Joshi/backstage-templates/blob/main/data-pipeline/template.yaml
      rules:
        - allow: [Template]

# ── Kubernetes ───────────────────────────────────────────────
kubernetes:
  # Kubernetes tab config — add cluster details when available
  # serviceLocatorMethod:
  #   type: 'multiTenant'
  # clusterLocatorMethods:
