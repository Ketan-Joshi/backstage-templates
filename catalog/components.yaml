##############################################################
# COMPONENTS
# Showcases: service, library, website, documentation types
# Showcases: all major annotations (TechDocs, GitHub, K8s,
#            PagerDuty, Datadog, Sentry, ArgoCD, Sonarqube)
# Showcases: relations (dependsOn, providesApi, consumesApi,
#            partOf, subcomponentOf)
##############################################################

# ── 1. Backend service (ECS / Fargate) ──────────────────────
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-service
  title: Order Service
  description: >
    Core microservice that manages the order lifecycle. Exposes the
    Orders REST API and publishes order events to Kafka.
  annotations:
    # TechDocs — renders docs/ folder as a documentation site
    backstage.io/techdocs-ref: dir:./docs/order-service

    # Source control
    github.com/project-slug: Ketan-Joshi/backstage-templates

    # Kubernetes — shows pods/deployments in the K8s tab
    backstage.io/kubernetes-id: order-service
    backstage.io/kubernetes-namespace: production
    backstage.io/kubernetes-label-selector: app=order-service

    # PagerDuty — links incidents to this component
    pagerduty.com/service-id: PXXXXXX

    # Datadog — links dashboards and SLOs
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/abc-123
    datadoghq.com/slo-url: https://app.datadoghq.com/slo/abc-123

    # Sentry — links error tracking
    sentry.io/project-slug: order-service

    # ArgoCD — links GitOps deployment
    argocd/app-name: order-service-production

    # SonarQube — links code quality
    sonarqube.org/project-key: Ketan-Joshi_order-service

    # Opsgenie
    opsgenie.com/component-selector: order-service

    # Jira
    jira/project-key: ORD

    # Backstage search
    backstage.io/source-location: url:https://github.com/Ketan-Joshi/backstage-templates

  tags:
    - java
    - spring-boot
    - ecs
    - fargate
    - kafka
  links:
    - url: https://grafana.example.com/d/order-service
      title: Grafana Dashboard
      icon: dashboard
    - url: https://runbooks.example.com/order-service
      title: Runbook
      icon: docs
    - url: https://sentry.io/organizations/Ketan-Joshi/projects/order-service
      title: Sentry
      icon: alert
spec:
  type: service
  lifecycle: production
  owner: backend-team
  system: order-management
  providesApis:
    - orders-api
  consumesApis:
    - payment-api
    - notification-api
  dependsOn:
    - resource:orders-db
    - resource:orders-kafka-topic
    - component:notification-service

