apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: order-events-pipeline
  title: Order Events Pipeline
  description: >
    Apache Kafka Streams application that consumes order events,
    transforms them, and loads them into the data warehouse (Redshift).
  annotations:
    backstage.io/techdocs-ref: dir:./docs/order-events-pipeline
    github.com/project-slug: Ketan-Joshi/backstage-templates
    backstage.io/kubernetes-id: order-events-pipeline
    backstage.io/kubernetes-namespace: data
    datadoghq.com/dashboard-url: https://app.datadoghq.com/dashboard/pipeline-123
    sentry.io/project-slug: order-events-pipeline
  tags:
    - kafka
    - kafka-streams
    - redshift
    - etl
    - data
  links:
    - url: https://grafana.example.com/d/order-events-pipeline
      title: Grafana Dashboard
      icon: dashboard
spec:
  type: service
  lifecycle: production
  owner: data-team
  system: data-ingestion
  consumesApis:
    - orders-events-asyncapi
  dependsOn:
    - resource:orders-kafka-topic
    - resource:redshift-cluster

