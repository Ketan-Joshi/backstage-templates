# ── 1. Orders REST API (OpenAPI) ─────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: orders-api
  title: Orders API
  description: >
    RESTful API for creating, reading, updating, and cancelling orders.
    Consumed by the Storefront and external partners.
  annotations:
    backstage.io/techdocs-ref: dir:./docs/orders-api
    github.com/project-slug: Ketan-Joshi/backstage-templates
  tags:
    - rest
    - openapi
    - orders
  links:
    - url: http://3.208.117.182:3000/api-docs/orders
      title: Swagger UI
      icon: web
spec:
  type: openapi
  lifecycle: production
  owner: backend-team
  system: order-management
  definition:
    $text: ./api-specs/orders-openapi.yaml

