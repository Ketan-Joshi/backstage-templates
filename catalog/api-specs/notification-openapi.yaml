openapi: "3.0.3"
info:
  title: Notification API
  version: "1.0.0"
  description: |
    API for sending and querying notifications across channels:
    email, SMS, and push notifications.
  contact:
    name: Backend Team
    email: backend-team@example.com

servers:
  - url: https://api.example.com/v1

paths:
  /notifications:
    post:
      summary: Send a notification
      operationId: sendNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "202":
          description: Notification queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
      security:
        - bearerAuth: []

  /notifications/{notificationId}:
    parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get notification status
      operationId: getNotification
      responses:
        "200":
          description: Notification details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SendNotificationRequest:
      type: object
      required: [channel, recipient, templateId]
      properties:
        channel:
          type: string
          enum: [email, sms, push]
        recipient:
          type: string
          description: Email address, phone number, or device token
        templateId:
          type: string
        templateData:
          type: object
          additionalProperties: true

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel:
          type: string
          enum: [email, sms, push]
        recipient:
          type: string
        status:
          type: string
          enum: [queued, sent, delivered, failed]
        createdAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
