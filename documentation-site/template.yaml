apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: documentation-site
  title: Create a TechDocs Documentation Site
  description: >
    Scaffolds a MkDocs-based documentation site that renders in Backstage TechDocs.
    Great for runbooks, architecture docs, team wikis, and onboarding guides.
  tags:
    - documentation
    - techdocs
    - mkdocs
  annotations:
    backstage.io/techdocs-ref: dir:.

spec:
  owner: platform-team
  type: documentation

  parameters:

    - title: Documentation details
      required:
        - docName
        - description
        - owner
      properties:
        docName:
          title: Documentation site name
          type: string
          description: Lowercase letters, numbers, and hyphens
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What is this documentation about?
          ui:widget: textarea

        owner:
          title: Team owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        docType:
          title: Documentation type
          type: string
          enum:
            - runbook
            - architecture
            - onboarding
            - api-guide
            - team-wiki
          default: team-wiki
          description: Helps categorise the documentation in the catalog

    - title: GitHub repository
      required:
        - repoName
        - repoOrg
      properties:
        repoName:
          title: Repository name
          type: string

        repoOrg:
          title: GitHub organisation
          type: string
          default: Ketan-Joshi

  steps:

    - id: fetch-template
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          docName: ${{ parameters.docName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          docType: ${{ parameters.docType }}
          repoOrg: ${{ parameters.repoOrg }}
          repoName: ${{ parameters.repoName }}

    - id: publish-github
      name: Create GitHub repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.repoName }}&owner=${{ parameters.repoOrg }}
        defaultBranch: main
        topics:
          - documentation
          - techdocs
          - mkdocs

    - id: register-catalog
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register-catalog'].output.entityRef }}
