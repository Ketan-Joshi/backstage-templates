site_name: "${{ values.docName }}"
site_description: "${{ values.description }}"
repo_url: https://github.com/${{ values.repoOrg }}/${{ values.repoName }}

docs_dir: docs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Reference: reference.md

plugins:
  - techdocs-core

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
